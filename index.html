<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Scanner (Malware Detection)</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>🛡️ File Scanner (Malware Detection)</h2>
    <p class="subtitle">
        Standalone Browser-Based Security Tool
    </p>

    <div class="drop-zone" id="dropZone">
        Click to Upload or Drag File
        <input
            type="file"
            id="fileInput"
            hidden
        >
    </div>

    <button id="scanBtn">Scan File</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
