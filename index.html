<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File-Scanner(Malware-Detection)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; text-align: center; border: 1px solid #334155; }
        .drop-zone { border: 2px dashed #3b82f6; padding: 2rem; border-radius: 0.5rem; margin: 1.5rem 0; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: #1e3a8a; }
        button { background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; width: 100%; }
        #result { margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem; display: none; font-size: 0.85rem; }
        .malicious { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        .clean { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ File-Scanner(Malware-Detection)</h2>
    <p style="color: #94a3b8;">Standalone Browser-Based Security Tool</p>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        Click to Upload or Drag File
        <input type="file" id="fileInput" hidden onchange="handleFile()">
    </div>

    <div id="result"></div>
</div>

<script>
    // Local Malware Signature Database (Hashes of known "test" viruses)
    const BLACKLIST = [
        "44d88612fea8a8f36de82e1278abb02f", // EICAR Standard Test
        "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8" // Sample "Malware" (word: password)
    ];

    async function handleFile() {
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');
        const file = fileInput.files[0];

        if (!file) return;

        resultDiv.style.display = "block";
        resultDiv.className = "";
        resultDiv.innerHTML = "⏳ Scanning file contents...";

        try {
            // Read file and generate SHA-256 Hash
            const arrayBuffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Check against our local "AI" Database
            if (BLACKLIST.includes(hashHex)) {
                resultDiv.className = "malicious";
                resultDiv.innerHTML = `<strong>⚠️ THREAT DETECTED!</strong><br>Match found in Signature DB.<br><small>Hash: ${hashHex.substring(0, 20)}...</small>`;
            } else {
                resultDiv.className = "clean";
                resultDiv.innerHTML = `<strong>✅ FILE CLEAN</strong><br>No malicious patterns detected.<br><small>Hash: ${hashHex.substring(0, 20)}...</small>`;
            }
        } catch (err) {
            resultDiv.innerHTML = "Error: " + err.message;
        }
    }
</script>

</body>
</html>
